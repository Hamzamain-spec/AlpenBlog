<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artikel — AlpenBlog</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pine:#1D4A2A;--forest:#2A6B3A;--snow:#F0F5F1;--white:#fff;--stone:#8A9E8E;--dark:#0E1F12;--mid:#5A7060;--border:#C8DCC8;--peak:#E8F0EA;--rust:#8B3A1A;--gold:#C8A020}
body{font-family:'Outfit',sans-serif;background:var(--snow);color:var(--dark)}
.mountain-top{height:8px;background:var(--pine);position:relative;overflow:hidden}
.mountain-top::before{content:'';position:absolute;bottom:0;left:0;right:0;height:8px;background:linear-gradient(135deg,transparent 50%,var(--pine) 50%) 0 0/32px 8px,linear-gradient(225deg,transparent 50%,var(--pine) 50%) 16px 0/32px 8px;background-color:var(--snow)}
header{background:var(--white);border-bottom:1px solid var(--border)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.logo{text-decoration:none;display:flex;align-items:center;gap:12px}
.logo-mountain{font-size:32px}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--pine)}
.logo-name span{color:var(--rust)}
nav{background:var(--pine)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;display:flex}
nav a{display:block;padding:11px 16px;color:rgba(255,255,255,0.7);text-decoration:none;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;border-bottom:2px solid transparent}
nav a:hover{color:#fff;border-bottom-color:var(--gold)}
.post-hero{background:linear-gradient(180deg,var(--pine) 0%,var(--forest) 100%);padding:72px 32px;color:#fff;position:relative;overflow:hidden}
.post-hero-mountains{position:absolute;bottom:0;left:0;right:0}
.post-hero-mountains svg{width:100%;height:50px;display:block}
.post-hero-inner{max-width:860px;margin:0 auto;position:relative;padding-bottom:30px}
.post-cat-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);padding:6px 14px;border-radius:100px;margin-bottom:18px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.8);letter-spacing:2px;text-transform:uppercase}
.post-title{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:24px}
.post-meta{display:flex;gap:24px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,0.5);font-weight:500;padding-top:20px;border-top:1px solid rgba(255,255,255,0.12)}
.post-meta span{color:rgba(255,255,255,0.85);font-weight:600}
.layout{max-width:1080px;margin:44px auto;padding:0 32px;display:grid;grid-template-columns:1fr 255px;gap:28px}
.main-col{background:var(--white);padding:44px;border:1px solid var(--border);border-radius:10px}
.back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--forest);text-decoration:none;font-size:12px;font-weight:600;margin-bottom:28px;padding:8px 16px;background:var(--peak);border-radius:100px;letter-spacing:0.5px;transition:all 0.2s}
.back-btn:hover{background:var(--pine);color:#fff}
.article-body{font-size:17px;line-height:1.9;color:#243020;font-weight:300}
.article-body p{margin-bottom:26px}
.article-body h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--pine);margin:50px 0 16px}
.article-body h3{font-size:19px;font-weight:600;color:var(--dark);margin:32px 0 10px}
.article-body a{color:var(--forest);font-weight:600;text-decoration:none;border-bottom:1px solid rgba(42,107,58,0.3)}
.article-body a:hover{color:var(--gold);border-color:var(--gold)}
.article-body ul,.article-body ol{padding-left:24px;margin-bottom:22px}
.article-body li{margin-bottom:8px;line-height:1.7}
blockquote{background:var(--peak);border-left:4px solid var(--gold);padding:22px 28px;margin:32px 0;font-style:italic;font-size:18px;color:var(--mid);border-radius:0 8px 8px 0}
.sidebar{display:flex;flex-direction:column;gap:16px}
.widget{background:var(--white);border:1px solid var(--border);padding:22px;border-radius:10px}
.widget-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--pine);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.recent-item{padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
.recent-item:last-child{border-bottom:none}
.recent-item a{color:var(--dark);text-decoration:none;font-weight:600;display:block;margin-bottom:3px;line-height:1.4}
.recent-item a:hover{color:var(--forest)}
.recent-item span{font-size:11px;color:#bbb}
.not-found{text-align:center;padding:80px;color:var(--mid);grid-column:1/-1}
.not-found h2{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--pine);margin-bottom:10px}
footer{background:var(--dark);color:rgba(255,255,255,0.4);text-align:center;padding:28px;font-size:12px;margin-top:60px}
footer a{color:rgba(255,255,255,0.4);text-decoration:none;margin:0 8px}
footer a:hover{color:var(--gold)}
.fl{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
.fl span{color:var(--gold)}
</style>
</head>
<body>
<div class="mountain-top"></div>
<header><div class="header-inner"><a href="index.html" class="logo"><div class="logo-mountain">🏔</div><div class="logo-name">Alpen<span>Blog</span></div></a></div></header>
<nav><div class="nav-inner"><a href="index.html">← Zurück</a><a href="index.html">Home</a><a href="index.html">Berge</a><a href="index.html">Natur</a></div></nav>
<div id="post-hero" class="post-hero" style="display:none">
  <div class="post-hero-inner">
    <div class="post-cat-badge">🏔 <span id="post-cat">Alpen</span></div>
    <div class="post-title" id="post-title"></div>
    <div class="post-meta"><span>✍ <span id="post-author">Redaktion</span></span><span>📅 <span id="post-date"></span></span><span>⏱ <span id="post-read">5 Min.</span></span></div>
  </div>
  <div class="post-hero-mountains"><svg viewBox="0 0 1200 50" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon points="0,50 0,35 100,15 200,38 300,10 400,32 500,5 600,28 700,2 800,25 900,8 1000,30 1100,12 1200,28 1200,50" fill="#F0F5F1"/></svg></div>
</div>
<div class="layout">
  <div class="main-col">
    <a href="index.html" class="back-btn">← Alle Beiträge</a>
    <div id="article-body" class="article-body"></div>
    <div id="not-found" class="not-found" style="display:none"><h2>Nicht gefunden</h2><p>Dieser Beitrag existiert nicht.</p></div>
  </div>
  <aside class="sidebar">
    <div class="widget"><div class="widget-title">🌲 Weitere Artikel</div><div id="recent-posts"></div></div>
    <div class="widget"><div class="widget-title">Über den Blog</div><p style="font-size:13px;line-height:1.7;color:#888;font-weight:300">AlpenBlog — Geschichten und Ratgeber aus den Alpen für alle Bergliebhaber.</p></div>
  </aside>
</div>
<footer><div class="fl">Alpen<span>Blog</span></div><p>&copy; 2026 AlpenBlog &nbsp;|&nbsp;<a href="#">Impressum</a>&nbsp;|&nbsp;<a href="#">Datenschutz</a></p></footer>
<script>
const params=new URLSearchParams(window.location.search),id=params.get('id');
const posts=JSON.parse(localStorage.getItem('db_posts')||'[]');
const post=posts.find(p=>p.id==id);
if(post){
  document.title=post.title+' — AlpenBlog';
  document.getElementById('post-title').textContent=post.title;
  document.getElementById('post-cat').textContent=post.category||'Alpen';
  document.getElementById('post-author').textContent=post.author||'Redaktion';
  document.getElementById('post-date').textContent=new Date(post.date).toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'});
  const words=post.content.replace(/<[^>]+>/g,'').split(' ').length;
  document.getElementById('post-read').textContent=Math.max(1,Math.round(words/200))+' Min. Lesezeit';
  document.getElementById('article-body').innerHTML=post.content;
  document.getElementById('post-hero').style.display='block';
  const rp=document.getElementById('recent-posts');
  posts.slice(-4).reverse().forEach(p=>{if(p.id==id)return;rp.innerHTML+=`<div class="recent-item"><a href="post.html?id=${p.id}">${p.title}</a><span>${new Date(p.date).toLocaleDateString('de-DE')}</span></div>`;});
}else{document.getElementById('not-found').style.display='block';}
</script>
</body>
</html>
